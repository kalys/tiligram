services:
  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  bot:
    command: './main start-bot --bot-token=${BOT_TOKEN} --sentry-dsn=${SENTRY_DSN} --mixpanel-token=${MIXPANEL_TOKEN}'
    image: kalys/tiligram:latest
    restart: always
    env_file:
      - .env
    volumes:
      - ./bleve.search:/root/bleve.search

  api:
    command: './main start-api --sentry-dsn=${SENTRY_DSN} --cors-origin=${CORS_ORIGIN}'
    image: kalys/tiligram:latest
    restart: always
    env_file:
      - .env
    volumes:
      - ./bleve.search:/root/bleve.search

volumes:
  caddy_data:
  caddy_config:
